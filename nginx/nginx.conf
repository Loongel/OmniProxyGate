user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" "$http3"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    client_max_body_size 0;

    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;

    include /etc/nginx/conf.d/*.conf;
}

stream {
    log_format stream_main '$remote_addr [$time_local] $protocol $status '
                           '$bytes_sent $bytes_received $session_time '
                           'sni="$ssl_preread_server_name" alpn="$ssl_preread_alpn_protocols"';
    access_log /var/log/nginx/stream-access.log stream_main;
    include /etc/nginx/stream.d/*.conf;
}
