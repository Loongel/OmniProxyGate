services:
  omni-proxygate:
    image: ${OMNI_IMAGE:-ghcr.io/OWNER/REPO:latest}
    ports:
      - target: 80
        published: ${OMNI_HTTP_PORT:-80}
        protocol: tcp
        mode: host
      - target: 443
        published: ${OMNI_HTTPS_PORT:-443}
        protocol: tcp
        mode: host
      - target: 443
        published: ${OMNI_HTTPS_PORT:-443}
        protocol: udp
        mode: host
      - target: 8080
        published: ${OMNI_UI_PORT:-18081}
        protocol: tcp
        mode: host
    volumes:
      # Persistent control-plane database, sessions, and config version records.
      - omni_data:/data
      # Generated Nginx snippets are rebuilt from /data at container startup.
      # Certificate/key material should be lifecycle-managed independently from the database.
      - omni_certs:/etc/nginx/certs
      # Optional: persist nginx logs. Leave disabled if host/driver log collection is preferred.
      # - omni_logs:/var/log/nginx
    environment:
      OMNI_RUN_GATEWAY: ${OMNI_RUN_GATEWAY:-true}
      OMNI_RUN_UI: ${OMNI_RUN_UI:-true}
      OMNI_WEB_UI_ENABLED: ${OMNI_WEB_UI_ENABLED:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      OMNI_ADMIN_USER: ${OMNI_ADMIN_USER:-admin}
      OMNI_ADMIN_PASSWORD: ${OMNI_ADMIN_PASSWORD:-}
      OMNI_ADMIN_FORCE_PASSWORD_RESET: ${OMNI_ADMIN_FORCE_PASSWORD_RESET:-false}
      OMNI_AGENT_API_TOKEN: ${OMNI_AGENT_API_TOKEN:-}
    networks:
      - gateway-net
    deploy:
      placement:
        constraints:
          - node.hostname == ${OMNI_NODE_HOSTNAME:-hd01}
      restart_policy:
        condition: any
        delay: 10s
        window: 120s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  gateway-net:
    driver: overlay
    attachable: true

volumes:
  omni_data:
    name: ${OMNI_DATA_VOLUME:-omni_proxygate_data}
  omni_certs:
    name: ${OMNI_CERTS_VOLUME:-omni_proxygate_certs}
  # omni_logs:
  #   name: ${OMNI_LOGS_VOLUME:-omni_proxygate_logs}
